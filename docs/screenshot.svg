<svg xmlns="http://www.w3.org/2000/svg" width="460" height="580" viewBox="0 0 460 580" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <!-- Window background (Catppuccin Mocha) -->
  <rect width="460" height="580" rx="10" fill="#11111b"/>

  <!-- Title bar hint -->
  <text x="24" y="30" fill="#585b70" font-size="11">⚡ Don't Lock My PC</text>

  <!-- Header -->
  <text x="230" y="112" fill="#cdd6f4" font-size="26" font-weight="600" text-anchor="middle">⚡ Keep Awake</text>
  <text x="230" y="138" fill="#585b70" font-size="11" text-anchor="middle">Keeps AI agents running — no lock, sleep or display-off</text>

  <!-- Status card -->
  <rect x="24" y="162" width="412" height="118" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>

  <!-- Pulse + status -->
  <circle cx="176" cy="200" r="7" fill="#a6e3a1"/>
  <text x="196" y="206" fill="#a6e3a1" font-size="14" font-weight="600">ACTIVE</text>

  <!-- Stats -->
  <text x="150" y="242" fill="#a6adc8" font-size="11" text-anchor="middle">Signals: 12</text>
  <text x="230" y="242" fill="#585b70" font-size="11" text-anchor="middle">•</text>
  <text x="312" y="242" fill="#a6adc8" font-size="11" text-anchor="middle">Last: 14:32:07</text>

  <!-- Interval control -->
  <text x="150" y="330" fill="#a6adc8" font-size="11" text-anchor="end">Interval</text>
  <rect x="162" y="316" width="44" height="24" rx="4" fill="#181825" stroke="#585b70"/>
  <text x="184" y="333" fill="#cdd6f4" font-size="12" font-weight="600" text-anchor="middle">30</text>
  <text x="214" y="330" fill="#585b70" font-size="11">sec</text>

  <!-- Buttons -->
  <rect x="24" y="366" width="200" height="40" rx="6" fill="#a6e3a1"/>
  <text x="124" y="391" fill="#11111b" font-size="12" font-weight="600" text-anchor="middle">▶  START</text>
  <rect x="236" y="366" width="200" height="40" rx="6" fill="#f38ba8"/>
  <text x="336" y="391" fill="#11111b" font-size="12" font-weight="600" text-anchor="middle">⏹  STOP</text>

  <!-- Lid-closed checkbox -->
  <rect x="132" y="424" width="14" height="14" rx="3" fill="#181825" stroke="#585b70"/>
  <path d="M135 431 l3 3 l5 -6" fill="none" stroke="#a6e3a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="154" y="436" fill="#a6adc8" font-size="11">Stay awake even with the lid closed</text>

  <!-- Autostart checkbox -->
  <rect x="150" y="448" width="14" height="14" rx="3" fill="#181825" stroke="#585b70"/>
  <path d="M153 455 l3 3 l5 -6" fill="none" stroke="#a6e3a1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="172" y="460" fill="#a6adc8" font-size="11">Start automatically at login</text>

  <!-- Footer -->
  <text x="230" y="556" fill="#585b70" font-size="10" text-anchor="middle">✕ exits  •  ─ minimize hides to the tray</text>
</svg>
